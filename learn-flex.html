<html>
  <head>
    <title>learn flex</title>
    <style>
      .one {
        height: 200px;
        width: 300px;
        background-color: brown;
        border: 2px solid black;
        font-size: 150px;
        text-align: center;
      }
      .two {
        height: 200px;
        width: 300px;
        background-color: rgb(149, 27, 86);
        border: 2px solid rgb(15, 16, 16);
        font-size: 150px;
        text-align: center;
      }
      .three {
        height: 200px;
        width: 300px;
        background-color: rgb(19, 114, 27);
        border: 2px solid rgb(12, 12, 12);
        font-size: 150px;
        text-align: center;
      }
      .main {
        height: 1000px;
        border: 4px solid rgb(5, 69, 5);
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
    </div>
  </body>
</html>

<html>
  <head>
    <title>Learn Position</title>
    <style>
      .one {
        width: 800px;
        height: 150px;
        text-align: center;
        font-weight: 100px;
        font-size: 100px;
        background-color: rgb(230, 18, 18);
      }
      .two {
        width: 800px;
        height: 150px;
        position: static;
        top: 200px;
        left: 200px;
        text-align: center;
        font-weight: 100px;
        font-size: 100px;
        background-color: rgb(38, 249, 38);
      }
      .three {
        width: 800px;
        height: 150px;
        position: sticky;
        top: 10px;
        text-align: center;
        font-size: 100px;
        font-weight: 100px;
        background-color: rgb(16, 16, 217);
      }
      .four {
        width: 800px;
        height: 150px;
        text-align: center;
        font-size: 100px;
        font-weight: 100px;
        background-color: rgb(82, 7, 152);
      }
      .five {
        width: 800px;
        height: 150px;
        text-align: center;
        font-size: 100px;
        font-weight: 100px;
        background-color: rgb(230, 18, 18);
      }
      .six {
        width: 800px;
        height: 150px;
        text-align: center;
        font-size: 100px;
        font-weight: 100px;
        background-color: rgb(139, 74, 27);
      }
    </style>
  </head>
  <body>
    <div class="one">1</div>
    <div class="two">2</div>
    <div class="three">3</div>
    <div class="four">4</div>
    <div class="five">5</div>
    <div class="six">6</div>
  </body>
</html>

<html>
  <head>
    <title>Learn z index</title>
  </head>
  <style>
    .one {
      width: 200px;
      height: 100px;
      position: relative;
      top: 50px;
      z-index: 1;
      border: 2px solid black;
      background-color: red;
    }
    .two {
      width: 200px;
      height: 100px;
      z-index: 2;
      position: relative;
      top: 50px;
      border: 2px solid black;
      background-color: aqua;
    }
  </style>
  <body>
    <div class="one">Text one</div>
    <span class="two">Text two</span>
  </body>
</html>

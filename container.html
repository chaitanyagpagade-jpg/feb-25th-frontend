<html>
  <head>
    <title>two box container</title>
    <style>
      .one {
        height: 400px;
        width: 400px;
        background-color: yellow;
      }
      .two {
        height: 400px;
        width: 400px;
        background-color: rgb(180, 80, 97);
      }
      li {
        list-style-type: lower-roman;
      }
      .four {
        height: 200px;
        width: 400px;
        border: 2px solid black;
        text-align: center;
      }
      .five {
        height: 200px;
        width: 400px;
        border: 2px solid black;
        text-align: center;
        box-sizing: border-box;
      }
    </style>
    <body>
      <div class="one"></div>
      <div class="two"></div>
      <ul>
        <li>list item one</li>
        <li>list item two</li>
        <li>list item three</li>
        <li>list item four</li>
        <li>list item five</li>
      </ul>

      <div class="four">content one</div>
      <div class="five">content two</div>
    </body>
  </head>
</html>

<html>
  <head>
    <title>Learn grid</title>
    <style>
      .one {
        height: 300px;
        width: auto;
        background-color: saddlebrown;
        font-size: 200px;
        text-align: center;
      }

      .two {
        height: 300px;
        width: auto;
        background-color: cadetblue;
        font-size: 200px;
        text-align: center;
      }

      .three {
        height: 300px;
        width: auto;
        background-color: hotpink;
        font-size: 200px;
        text-align: center;
      }

      .four{
        height: 300px;
        width: auto;
        background-color:rebeccapurple;
        font-size: 200px;
        text-align: center;

      }

      .main {
        display: grid;
        grid-template-columns: 30% 70%;
      }
    </style>
  </head>
  <body>
    <div class="main">
    <div class="one">1</div>
    <div class="two">2</div>
    <div class="three">3</div>    
    <div class="four">4</div>
  </body>
</html>
